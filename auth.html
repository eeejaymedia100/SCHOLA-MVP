<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Schola — Sign In</title>
  <link rel="stylesheet" href="css/schola.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: #1A1F36;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .auth-bg {
      background: #1A1F36;
      padding: 48px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .auth-card {
      background: #fff;
      border-radius: 28px 28px 0 0;
      flex: 1;
      padding: 28px 24px 40px;
      min-height: 60vh;
    }
    .tab-row {
      display: flex;
      background: #F1F5F9;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1; padding: 10px; border: none; border-radius: 9px;
      font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
      font-size: 14px; cursor: pointer; transition: all 0.2s;
      background: transparent; color: #64748B;
    }
    .tab-btn.active {
      background: #fff; color: #1A1F36;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .form-section { display: none; }
    .form-section.active { display: flex; flex-direction: column; gap: 16px; }
    
    .select-wrap {
      background: #F1F5F9; border: 2px solid transparent;
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .select-wrap:focus-within { border-color: #4F46E5; background: #fff; }
    .select-wrap select {
      flex: 1; border: none; background: transparent; outline: none;
      font-family: 'Inter', sans-serif; font-size: 15px; color: #1E293B;
      -webkit-appearance: none;
    }
    .eye-btn {
      background: none; border: none; cursor: pointer; 
      color: #64748B; padding: 0;
    }
  </style>
</head>
<body>

  <!-- TOP: Brand mark -->
  <div class="auth-bg">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#4F46E5,#818cf8);
        display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
        <svg width="28" height="28" viewBox="0 0 44 44" fill="none">
          <path d="M10 30C10 20 16 13 22 9C28 13 34 20 34 30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="22" cy="30" r="6" fill="white"/>
        </svg>
      </div>
      <h1 class="brand" style="color:#fff;font-size:26px;font-weight:800;">Schola</h1>
    </div>
  </div>

  <!-- BOTTOM: White card -->
  <div class="auth-card anim-slide-up">

    <!-- Login / Register tabs -->
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn"        id="tab-register" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- ── LOGIN FORM ── -->
    <div class="form-section active" id="form-login">
      <div class="input-group">
        <label class="input-label">Email Address</label>
        <div class="input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="login-email" placeholder="you@university.edu" autocomplete="email"/>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="input-wrap" id="login-pw-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password"/>
          <button class="eye-btn" onclick="togglePw('login-pw', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div style="text-align:right;margin-top:-8px;">
        <a href="#" style="font-size:13px;color:#4F46E5;font-weight:600;text-decoration:none;"
          onclick="showForgotPassword()">Forgot Password?</a>
      </div>

      <div id="login-error" style="color:#DC2626;font-size:13px;display:none;"></div>

      <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">
        Sign In
      </button>
    </div>

    <!-- ── REGISTER FORM ── -->
    <div class="form-section" id="form-register">
      <div class="input-group">
        <label class="input-label">Full Name</label>
        <div class="input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="reg-name" placeholder="Julius Adewale" autocomplete="name"/>
        </div>
        <span class="field-error" id="err-name"></span>
      </div>

      <div class="input-group">
        <label class="input-label">Matriculation Number</label>
        <div class="input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
          <input type="text" id="reg-mat" placeholder="e.g. UL/21/0001"/>
        </div>
        <span class="field-error" id="err-mat"></span>
      </div>

      <div class="input-group">
        <label class="input-label">Department</label>
        <div class="select-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <select id="reg-dept">
            <option value="">Select Department</option>
            <option value="Agticultural Economics">Agriculyural Economics</option>
            <option value="Agricultural Extension">Agricultural Extension</option>
            <option value="Agri-business Management">Agricultural Management</option>
            <option value="Animal Science">Animal Science</option>
            <option value="Crop Science (Agronomy)">Crop Science (Agronomy)</option>
            <option value="Soil Science (Agronomy)">Soil Science (Agronomy)</option>
            <option value="Forestry and Wildlife">Forestry and Wildlife</option>
            <option value="Fisheries and Aquaculture">Fisheries and Aquaculture</option>
          </select>
        </div>
        <span class="field-error" id="err-dept"></span>
      </div>

      <div class="input-group">
        <label class="input-label">Level</label>
        <div class="select-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <select id="reg-level">
            <option value="">Select Level</option>
          </select>
        </div>
        <span class="field-error" id="err-level"></span>
      </div>

      <div class="input-group">
        <label class="input-label">Email Address</label>
        <div class="input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="reg-email" placeholder="you@university.edu" autocomplete="email"/>
        </div>
        <span class="field-error" id="err-email"></span>
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" id="reg-pw" placeholder="Min. 6 characters"/>
          <button class="eye-btn" onclick="togglePw('reg-pw', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="err-pw"></span>
      </div>

      <div id="reg-error" style="color:#DC2626;font-size:13px;display:none;"></div>

      <button class="btn btn-primary" id="reg-btn" onclick="handleRegister()">
        Create My Account
      </button>

      <p style="text-align:center;font-size:12px;color:#94A3B8;line-height:1.6;">
        By creating an account you agree to our 
        <a href="#" style="color:#4F46E5;">Terms</a> and 
        <a href="#" style="color:#4F46E5;">Privacy Policy</a>
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // Init Firebase
    firebase.initializeApp(SCHOLA_CONFIG.firebase);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    // Redirect if already logged in
    if (Session.get()) goTo('home.html', 0);

    // Populate dropdowns
    const deptSel  = document.getElementById('reg-dept');
    const levelSel = document.getElementById('reg-level');
    SCHOLA_CONFIG.departments.forEach(d => {
      deptSel.innerHTML += `<option value="${d}">${d}</option>`;
    });
    SCHOLA_CONFIG.levels.forEach(l => {
      levelSel.innerHTML += `<option value="${l}">${l} Level</option>`;
    });

    // Check URL param for initial tab
    const mode = new URLSearchParams(window.location.search).get('mode');
    if (mode === 'register') switchTab('register');

    function switchTab(tab) {
      ['login','register'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('active', t === tab);
        document.getElementById('form-' + t).classList.toggle('active', t === tab);
      });
    }

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.classList.toggle('btn-loading', loading);
      btn.textContent = loading
        ? (btnId === 'login-btn' ? 'Signing in...' : 'Creating account...')
        : (btnId === 'login-btn' ? 'Sign In' : 'Create My Account');
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    // ── LOGIN ─────────────────────────────────
    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;

      showErr('login-error', '');
      if (!email) { showErr('login-error', 'Email is required'); return; }
      if (!pw)    { showErr('login-error', 'Password is required'); return; }

      setLoading('login-btn', true);
      try {
        const cred = await auth.signInWithEmailAndPassword(email, pw);
        // Fetch user profile from Firestore
        const snap = await db.collection('students').doc(cred.user.uid).get();
        if (snap.exists) {
          Session.set({ uid: cred.user.uid, email: cred.user.email, ...snap.data() });
        } else {
          Session.set({ uid: cred.user.uid, email: cred.user.email, fullName: cred.user.displayName });
        }
        goTo('home.html');
      } catch (e) {
        setLoading('login-btn', false);
        const msgs = {
          'auth/invalid-credential': 'Email or password is incorrect',
          'auth/user-not-found':     'No account found for this email',
          'auth/wrong-password':     'Incorrect password',
          'auth/too-many-requests':  'Too many attempts. Please wait and try again',
          'auth/network-request-failed': 'No internet connection',
        };
        showErr('login-error', msgs[e.code] || 'Login failed. Please try again.');
      }
    }

    // ── REGISTER ──────────────────────────────
    async function handleRegister() {
      const name  = document.getElementById('reg-name').value.trim();
      const mat   = document.getElementById('reg-mat').value.trim().toUpperCase();
      const dept  = document.getElementById('reg-dept').value;
      const level = document.getElementById('reg-level').value;
      const email = document.getElementById('reg-email').value.trim();
      const pw    = document.getElementById('reg-pw').value;

      // Clear errors
      ['name','mat','dept','level','email','pw'].forEach(f => showErr('err-' + f, ''));
      showErr('reg-error', '');

      // Validate
      let valid = true;
      if (!name)  { showErr('err-name', 'Full name is required');    valid = false; }
      if (!mat)   { showErr('err-mat',  'Matric number is required'); valid = false; }
      if (!dept)  { showErr('err-dept', 'Select your department');    valid = false; }
      if (!level) { showErr('err-level','Select your level');         valid = false; }
      if (!email || !email.includes('@')) { showErr('err-email', 'Enter a valid email'); valid = false; }
      if (pw.length < 6) { showErr('err-pw', 'Minimum 6 characters'); valid = false; }
      if (!valid) return;

      setLoading('reg-btn', true);
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pw);
        await cred.user.updateProfile({ displayName: name });

        const profile = {
          uid:        cred.user.uid,
          fullName:   name,
          matNumber:  mat,
          department: dept,
          level:      parseInt(level),
          email,
          role:       'student',
          plan:       'free',
          totalPaid:  0,
          streak:     0,
          aiMessages: 0,
          badges:     [],
          createdAt:  firebase.firestore.FieldValue.serverTimestamp(),
        };

        await db.collection('students').doc(cred.user.uid).set(profile);
        Session.set(profile);
        goTo('home.html');
      } catch (e) {
        setLoading('reg-btn', false);
        const msgs = {
          'auth/email-already-in-use': 'An account already exists for this email',
          'auth/weak-password':        'Password is too weak (minimum 6 characters)',
          'auth/invalid-email':        'Invalid email address',
          'auth/network-request-failed': 'No internet connection',
        };
        showErr('reg-error', msgs[e.code] || 'Registration failed. Please try again.');
      }
    }

    async function showForgotPassword() {
      const email = document.getElementById('login-email').value.trim();
      if (!email) { showErr('login-error', 'Enter your email first, then tap Forgot Password'); return; }
      try {
        await auth.sendPasswordResetEmail(email);
        toast('Reset link sent to ' + email, 'success');
      } catch (e) {
        showErr('login-error', 'Could not send reset email. Check the address.');
      }
    }
  </script>
</body>
</html>
