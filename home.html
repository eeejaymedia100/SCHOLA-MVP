<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Schola — Home</title>
  <link rel="stylesheet" href="css/schola.css">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    /* Greeting card with animated gradient */
    .greeting-card {
      background: linear-gradient(-45deg, #1A1F36, #252d4a, #1e2d5a, #1A1F36);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      border-radius: 22px;
      padding: 22px;
      color: #fff;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .greeting-card::before {
      content: '';
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,70,229,0.25), transparent 70%);
      top: -80px; right: -60px;
      pointer-events: none;
    }

    .balance-chip {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 14px 16px;
      backdrop-filter: blur(8px);
    }

    /* Animated streak card */
    .streak-card {
      border-radius: 18px;
      padding: 18px 20px;
      color: #fff;
      display: flex; align-items: center; gap: 16px;
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #059669, #10b981);
    }
    .streak-card::before {
      content: '';
      position: absolute;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      right: -40px; top: -40px;
    }

    /* Flame icon animated */
    .flame-icon {
      font-size: 36px;
      display: block;
    }

    /* Notice card */
    .notice-card {
      background: var(--surface);
      border-radius: 16px; padding: 16px;
      box-shadow: var(--shadow-xs);
      margin-bottom: 10px;
      display: flex; gap: 12px; align-items: flex-start;
      cursor: pointer; border-left: none;
      position: relative; overflow: hidden;
    }
    .notice-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--notice-color, var(--indigo));
    }
    .notice-icon-wrap {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* Deadline card */
    .deadline-card {
      background: var(--surface);
      border-radius: 14px; padding: 14px 16px;
      box-shadow: var(--shadow-xs);
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
    }
    .deadline-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .days-left {
      font-size: 12px; font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar" data-anim style="opacity:0;">
    <div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:2px;" id="greeting-sub-top"></p>
      <h2 style="font-size:19px;" id="top-name">Schola</h2>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <!-- Avatar -->
      <div id="user-avatar" onclick="goTo('profile.html')"
        style="width:38px;height:38px;border-radius:50%;
        background:linear-gradient(135deg,#4F46E5,#818cf8);
        display:flex;align-items:center;justify-content:center;
        color:#fff;font-weight:800;font-size:14px;cursor:pointer;
        font-family:'Plus Jakarta Sans',sans-serif;">
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" style="padding-top:8px;">

    <!-- GREETING CARD -->
    <div class="greeting-card" data-anim style="opacity:0;" id="greeting-card">
      <div style="position:relative;z-index:1;">
        <p style="font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:4px;" id="greeting-label">Good morning</p>
        <h2 style="font-size:22px;font-weight:800;margin-bottom:2px;" id="greeting-name">Welcome back!</h2>
        <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:20px;" id="greeting-info">Loading...</p>
        <div class="balance-chip">
          <div>
            <p style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px;">Outstanding Balance</p>
            <p style="font-size:22px;font-weight:800;" id="balance-display">₦—</p>
          </div>
          <button class="btn btn-primary btn-sm" onclick="goTo('pay.html')"
            style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.25);
            box-shadow:none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
            </svg>
            Pay Now
          </button>
        </div>
      </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div data-anim style="opacity:0;margin-bottom:20px;">
      <p class="section-header">Quick Actions</p>
      <div class="quick-grid">
        <a href="study.html" class="quick-action">
          <div class="qa-icon" style="background:#EEF2FF;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2" stroke-linecap="round">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
          </div>
          Study AI
        </a>
        <a href="pay.html" class="quick-action">
          <div class="qa-icon" style="background:#ECFDF5;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round">
              <rect x="1" y="4" width="22" height="16" rx="2"/>
              <line x1="1" y1="10" x2="23" y2="10"/>
            </svg>
          </div>
          Pay Dues
        </a>
        <a href="profile.html" class="quick-action">
          <div class="qa-icon" style="background:#FFFBEB;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </div>
          Rankings
        </a>
        <a href="profile.html" class="quick-action">
          <div class="qa-icon" style="background:#F5F3FF;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          Profile
        </a>
      </div>
    </div>

    <!-- STREAK CARD -->
    <div class="streak-card" data-anim style="opacity:0;margin-bottom:20px;" id="streak-card">
      <div style="font-size:40px;line-height:1;" id="flame-anim">🔥</div>
      <div style="flex:1;position:relative;z-index:1;">
        <div style="font-size:19px;font-weight:800;" id="streak-text">0 day streak</div>
        <div style="font-size:12px;opacity:0.75;margin-top:2px;" id="streak-sub">
          Open Study to start your streak
        </div>
      </div>
      <div style="position:relative;z-index:1;">
        <div style="font-size:10px;opacity:0.6;text-align:center;">BEST</div>
        <div style="font-size:18px;font-weight:800;text-align:center;" id="streak-best">0</div>
      </div>
    </div>

    <!-- DEADLINES -->
    <div data-anim style="opacity:0;margin-bottom:20px;">
      <div class="section-header">
        <span style="display:flex;align-items:center;gap:8px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          Upcoming Deadlines
        </span>
      </div>
      <div id="deadlines-list"></div>
    </div>

    <!-- NOTICES -->
    <div data-anim style="opacity:0;margin-bottom:20px;">
      <div class="section-header">
        <span style="display:flex;align-items:center;gap:8px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          Campus Notices
        </span>
        <a href="#">See all</a>
      </div>
      <div id="notices-list"></div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/animations.js"></script>
  <script>
    firebase.initializeApp(SCHOLA_CONFIG.firebase);
    const db   = firebase.firestore();
    const user = Session.require();

    // Set user info
    const firstName = user.fullName?.split(' ')[0] || 'Student';
    const initials  = (user.fullName || 'S').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

    document.getElementById('greeting-sub-top').textContent = greeting();
    document.getElementById('top-name').textContent         = 'Home';
    document.getElementById('user-avatar').textContent      = initials;
    document.getElementById('greeting-label').textContent   = greeting() + ', 👋';
    document.getElementById('greeting-name').textContent    = firstName;
    document.getElementById('greeting-info').textContent    =
      `${user.department || 'Department'} · ${user.level || ''}L · ${user.matNumber || ''}`;

    // Streak
    const streak = parseInt(localStorage.getItem('schola_streak') || '0');
    const bestStreak = parseInt(localStorage.getItem('schola_best_streak') || '0');
    document.getElementById('streak-text').textContent =
      streak + (streak === 1 ? ' day streak' : ' day streak');
    document.getElementById('streak-sub').textContent = streak > 0
      ? 'Keep it up! Study today to maintain it 💪'
      : 'Open Study to start your streak';
    document.getElementById('streak-best').textContent = bestStreak;

    // Deadlines data
    const deadlines = [
      { label:'Association Dues', daysLeft:3, category:'Association', color:'#DC2626', iconColor:'#FEF2F2' },
      { label:'Course Registration', daysLeft:7, category:'Academic', color:'#D97706', iconColor:'#FFFBEB' },
      { label:'Library Dues', daysLeft:14, category:'Library', color:'#059669', iconColor:'#ECFDF5' },
    ];

    document.getElementById('deadlines-list').innerHTML = deadlines.map(d => `
      <div class="deadline-card card-tap" onclick="goTo('pay.html')">
        <div class="deadline-icon" style="background:${d.iconColor};">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${d.color}" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:14px;margin-bottom:2px;">${d.label}</div>
          <div style="font-size:12px;color:var(--muted);">${d.category}</div>
        </div>
        <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <span class="days-left" style="color:${d.daysLeft<=3?'#DC2626':d.daysLeft<=7?'#D97706':'#059669'};">
            ${d.daysLeft}d left
          </span>
          <span class="badge ${d.daysLeft<=3?'badge-red':d.daysLeft<=7?'badge-amber':'badge-green'}"
            style="font-size:10px;padding:2px 8px;">
            ${d.daysLeft<=3?'Urgent':d.daysLeft<=7?'Soon':'On Track'}
          </span>
        </div>
      </div>
    `).join('');

    // Notices
    const notices = [
      { source:'ASSOCIATION', title:'Dues deadline in 3 days', preview:'All Level 300 students must clear association dues before exam registration opens this Friday.', color:'#4F46E5', bgIcon:'#EEF2FF', iconColor:'#4F46E5' },
      { source:'DEPARTMENT', title:'Course registration opens Monday', preview:'Students who have not completed fee clearance will not be able to register.', color:'#059669', bgIcon:'#ECFDF5', iconColor:'#059669' },
      { source:'FACULTY', title:'Faculty games registration open', preview:'The annual faculty sports games begin next month. Register your team by Thursday.', color:'#D97706', bgIcon:'#FFFBEB', iconColor:'#D97706' },
    ];

    document.getElementById('notices-list').innerHTML = notices.map(n => `
      <div class="notice-card card-tap" style="--notice-color:${n.color};">
        <div class="notice-icon-wrap" style="background:${n.bgIcon};">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${n.iconColor}" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:10px;font-weight:700;color:${n.color};margin-bottom:4px;
            font-family:'Plus Jakarta Sans',sans-serif;">${n.source}</div>
          <div style="font-weight:700;font-size:14px;margin-bottom:3px;">${n.title}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.45;
            overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">
            ${n.preview}
          </div>
        </div>
      </div>
    `).join('');

    // Load balance from Firestore
    db.collection('students').doc(user.uid).get().then(snap => {
      if (snap.exists) {
        const data = snap.data();
        const totalFees  = SCHOLA_CONFIG.fees.reduce((s, f) => s + f.amount, 0);
        const outstanding = Math.max(0, totalFees - (data.totalPaid || 0));
        // Animate counter
        const el = document.getElementById('balance-display');
        PageAnim.counter(el, outstanding, '₦', '', 1.0);
      } else {
        document.getElementById('balance-display').textContent = naira(0);
      }
    }).catch(() => {
      document.getElementById('balance-display').textContent = naira(0);
    });

    // Entrance animations after DOM ready
    window.addEventListener('load', () => {
      gsap.fromTo('[data-anim]',
        { opacity: 0, y: 28 },
        {
          opacity: 1, y: 0, duration: 0.55,
          stagger: 0.09, ease: 'power3.out',
          clearProps: 'transform'
        }
      );
      // Animate deadline and notice cards
      setTimeout(() => {
        const cards = document.querySelectorAll('.deadline-card, .notice-card');
        PageAnim.staggerList(cards, 0.07);
        Micro.initAll();
        // Pulse flame
        gsap.to('#flame-anim', {
          scale: 1.1, duration: 0.8,
          ease: 'sine.inOut', yoyo: true, repeat: -1
        });
      }, 400);
    });
  </script>

  <script>renderNav('home');</script>
</body>
</html>
